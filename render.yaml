# Render Blueprint — auto-configures the service on Render.com
services:
  - type: web
    name: hcmc-realestate
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    plan: free
